<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>શાર્દૂલ સમર્થ — સાપ્તાહિક સમયપત્રક (13/07/2026 થી 17/07/2026)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --saffron:#F07800; --brown:#3B1000; --gold:#FFD060;
    --bg:#FBF7F2; --bg-lt:#FAF5EC; --bd:#E8DDD0; --mu:#7A6A5A;
  }
  *{box-sizing:border-box}
  body{font-family:'Noto Sans Gujarati',sans-serif;margin:0;background:var(--bg);color:#222}

  .container{max-width:960px;margin:0 auto;padding:16px}
  .header{text-align:center;margin-bottom:14px;border-bottom:3px solid var(--saffron);padding-bottom:12px;background:var(--bg)}
  .header h1{color:var(--brown);margin:0;font-size:24px}
  .header p{color:var(--mu);margin:4px 0 0;font-size:13px}
  .header .selinfo{color:var(--saffron);font-weight:600;font-size:14px}
  .header .daterange{color:var(--brown);font-weight:700;font-size:15px;margin-top:6px}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:#fff;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:14px}
  .ctrl{display:flex;flex-direction:column;gap:3px}
  .ctrl label{font-size:11.5px;font-weight:600;color:var(--brown)}
  .ctrl select{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--bd);border-radius:7px;background:var(--bg-lt);color:#222;min-width:120px}
  .btns{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .btns button{font-family:inherit;font-size:13px;font-weight:600;padding:7px 12px;border:none;border-radius:7px;cursor:pointer;background:var(--saffron);color:#fff}
  .btns button.alt{background:var(--brown)}
  .btns button:disabled{opacity:.55;cursor:wait}

  .tablewrap{overflow-x:auto}
  table.sched{width:100%;border-collapse:collapse;margin-bottom:14px;background:#fff}
  table.sched th.daytitle{background:var(--gold);color:var(--brown);font-size:14px;text-align:center;padding:8px;border:2px solid var(--bd)}
  table.sched th{border:1px solid var(--bd);padding:6px;font-size:12px;background:#fff6e0;color:var(--brown)}
  table.sched td{border:1px solid var(--bd);padding:6px;font-size:12px;vertical-align:top}
  table.sched td.time{font-weight:700;color:var(--brown);background:var(--bg-lt);white-space:nowrap;text-align:center;width:80px}
  table.sched td.empty{color:var(--mu);text-align:center;font-style:italic}
  table.sched .subj{font-weight:600;color:#222;margin-bottom:3px}
  table.sched .meta{font-size:11px;color:#666}

  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;justify-content:center;padding:10px;background:#fff;border-radius:8px}
  .lg-item{display:flex;align-items:center;gap:6px;font-size:12px}
  .lg-swatch{width:12px;height:12px;border-radius:2px;display:inline-block;border:1px solid rgba(0,0,0,.15)}

  @media print{
    body{margin:0;padding:0;background:#fff}
    .container{max-width:100%;padding:10mm}
    .no-print{display:none !important}
    table.sched{page-break-inside:avoid;break-inside:avoid}
  }
</style>
</head>
<body>
<div class="container">
  <div class="toolbar no-print">
    <div class="ctrl">
      <label for="viewSel">જુઓ</label>
      <select id="viewSel">
        <option value="full">સંપૂર્ણ સમયપત્રક</option>
        <option value="group">જૂથ પ્રમાણે</option>
        <option value="teacher">શિક્ષક પ્રમાણે</option>
      </select>
    </div>
    <div class="ctrl" id="groupCtrl" style="display:none">
      <label for="groupSel">જૂથ</label>
      <select id="groupSel"></select>
    </div>
    <div class="ctrl" id="teacherCtrl" style="display:none">
      <label for="teacherSel">શિક્ષક</label>
      <select id="teacherSel"></select>
    </div>
    <div class="ctrl">
      <label for="daySel">દિવસ</label>
      <select id="daySel"></select>
    </div>
    <div class="btns">
      <button id="imgBtn" onclick="downloadImage()">🖼️ ઇમેજ ડાઉનલોડ</button>
      <button id="pdfBtn" onclick="downloadPDF()">📄 PDF ડાઉનલોડ</button>
      <button class="alt" onclick="window.print()">🖨️ પ્રિન્ટ</button>
    </div>
  </div>
  <noscript><p style="text-align:center;color:#a00">આ પેજ માટે JavaScript જરૂરી છે.</p></noscript>

  <div id="capture">
    <div class="header pdf-block">
      <h1>શાર્દૂલ સમર્થ</h1>
      <p>સાપ્તાહિક સમયપત્રક</p>
      <p class="daterange">13/07/2026 થી 17/07/2026</p>
      <p class="selinfo" id="selInfo"></p>
    </div>
    <div id="printArea"></div>
  </div>
</div>

,"teacher":"","location":""},"bhaskar":{"subject":"","teacher":"","location":""}}}},"dayDates":{"સોમવાર":"13/07/2026","મંગળવાર":"14/07/2026","બુધવાર":"15/07/2026","ગુરુવાર":"16/07/2026","શુક્રવાર":"17/07/2026"}};

var state = { view: 'full', group: '', teacher: '', day: 'all' };

/* ---------- helpers ---------- */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hslToHex(h, s, l){
  s /= 100; l /= 100;
  var a = s * Math.min(l, 1 - l);
  var f = function(n){
    var k = (n + h / 30) % 12;
    var c = l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return '#' + f(0) + f(8) + f(4);
}
/* Same curated palette as the editor apps (V2/V3): consecutive entries jump
   across hue families and vary in depth so subjects adjacent in the sorted
   list stay clearly distinguishable. Keep in sync with the editors. */
var SUBJECT_PALETTE = [
  [25,90,82],[205,75,80],[95,60,80],[320,70,84],[55,85,78],[255,65,84],
  [0,80,84],[170,60,76],[35,60,70],[285,55,82],[140,55,72],[225,60,74],
  [10,65,74],[75,55,70],[300,45,74],[190,70,68],[45,90,66],[340,60,74],
  [120,40,84],[265,45,70],[155,70,86],[215,45,88],[355,45,88],[85,70,88]
];
function colorForSubject(subject){
  if (!subject) return 'transparent';
  var list = (DATA.subjects || []).slice().sort(function(a, b){ return a.localeCompare(b, 'gu'); });
  var idx = list.indexOf(subject);
  if (idx === -1) idx = 0;
  var p = SUBJECT_PALETTE[idx % SUBJECT_PALETTE.length];
  var l = Math.max(60, p[2] - 8 * Math.floor(idx / SUBJECT_PALETTE.length));
  return hslToHex(p[0], p[1], l);
}
function groupByKey(key){
  for (var i = 0; i < DATA.groups.length; i++)
    if (DATA.groups[i].key === key) return DATA.groups[i];
  return null;
}
function teachersInWeek(){
  var seen = {}, list = [];
  DATA.days.forEach(function(day){
    var dayData = DATA.week[day] || {};
    DATA.slots.forEach(function(slot){
      var slotData = dayData[slot] || {};
      DATA.groups.forEach(function(g){
        var cell = slotData[g.key];
        if (cell && cell.teacher && !seen[cell.teacher]){
          seen[cell.teacher] = true;
          list.push(cell.teacher);
        }
      });
    });
  });
  return list;
}
function activeDays(){
  return state.day === 'all' ? DATA.days : [state.day];
}
function dayDate(day){
  return (DATA.dayDates && DATA.dayDates[day]) || '';
}
function dayTitle(day){
  var d = dayDate(day);
  return esc(day) + (d ? ' • ' + esc(d) : '');
}

/* ---------- table builders (one table per day, wrapped for PDF paging) ---------- */
function wrapDayTable(inner){
  return '<div class="pdf-block tablewrap">' + inner + '</div>';
}
function cellHtml(cell, usedSubjects){
  if (!cell || !cell.subject) return '<td></td>';
  usedSubjects[cell.subject] = true;
  var bg = colorForSubject(cell.subject);
  var h = '<td style="background-color:' + bg + ';">';
  h += '<div class="subj">' + esc(cell.subject) + '</div>';
  if (cell.teacher) h += '<div class="meta">શિક્ષક: ' + esc(cell.teacher) + '</div>';
  if (cell.location) h += '<div class="meta">સ્થળ: ' + esc(cell.location) + '</div>';
  h += '</td>';
  return h;
}
function buildFullView(usedSubjects){
  var html = '';
  activeDays().forEach(function(day){
    var dayData = DATA.week[day];
    if (!dayData) return;
    var t = '<table class="sched">';
    t += '<thead><tr><th class="daytitle" colspan="' + (DATA.groups.length + 1) + '">' + dayTitle(day) + '</th></tr>';
    t += '<tr><th>સમય</th>';
    DATA.groups.forEach(function(g){ t += '<th>' + esc(g.name) + ' (' + esc(g.age) + ')</th>'; });
    t += '</tr></thead><tbody>';
    DATA.slots.forEach(function(slot){
      var slotData = dayData[slot];
      if (!slotData) return;
      var any = DATA.groups.some(function(g){ var c = slotData[g.key]; return c && c.subject; });
      if (!any) return;
      t += '<tr><td class="time">' + esc(slot) + '</td>';
      DATA.groups.forEach(function(g){ t += cellHtml(slotData[g.key], usedSubjects); });
      t += '</tr>';
    });
    t += '</tbody></table>';
    html += wrapDayTable(t);
  });
  return html;
}
function buildGroupView(usedSubjects){
  var g = groupByKey(state.group);
  if (!g) return '';
  var html = '';
  activeDays().forEach(function(day){
    var dayData = DATA.week[day] || {};
    var rows = '';
    DATA.slots.forEach(function(slot){
      var cell = (dayData[slot] || {})[g.key];
      if (!cell || !cell.subject) return;
      usedSubjects[cell.subject] = true;
      var bg = colorForSubject(cell.subject);
      rows += '<tr><td class="time">' + esc(slot) + '</td>';
      rows += '<td style="background-color:' + bg + ';"><span class="subj">' + esc(cell.subject) + '</span></td>';
      rows += '<td>' + esc(cell.teacher || '—') + '</td>';
      rows += '<td>' + esc(cell.location || '—') + '</td></tr>';
    });
    if (!rows){
      if (state.day === 'all') return; // skip empty days in the all-days view
      rows = '<tr><td class="empty" colspan="4">કોઈ પ્રવૃત્તિ નથી</td></tr>';
    }
    var t = '<table class="sched">';
    t += '<thead><tr><th class="daytitle" colspan="4">' + dayTitle(day) + '</th></tr>';
    t += '<tr><th>સમય</th><th>વિષય</th><th>શિક્ષક</th><th>સ્થળ</th></tr></thead>';
    t += '<tbody>' + rows + '</tbody></table>';
    html += wrapDayTable(t);
  });
  return html;
}
function buildTeacherView(usedSubjects){
  var teacher = state.teacher;
  if (!teacher) return '';
  var html = '';
  activeDays().forEach(function(day){
    var dayData = DATA.week[day] || {};
    var rows = '';
    DATA.slots.forEach(function(slot){
      var slotData = dayData[slot] || {};
      DATA.groups.forEach(function(g){
        var cell = slotData[g.key];
        if (!cell || !cell.subject || cell.teacher !== teacher) return;
        usedSubjects[cell.subject] = true;
        var bg = colorForSubject(cell.subject);
        rows += '<tr><td class="time">' + esc(slot) + '</td>';
        rows += '<td>' + esc(g.name) + ' (' + esc(g.age) + ')</td>';
        rows += '<td style="background-color:' + bg + ';"><span class="subj">' + esc(cell.subject) + '</span></td>';
        rows += '<td>' + esc(cell.location || '—') + '</td></tr>';
      });
    });
    if (!rows){
      if (state.day === 'all') return;
      rows = '<tr><td class="empty" colspan="4">કોઈ પ્રવૃત્તિ નથી</td></tr>';
    }
    var t = '<table class="sched">';
    t += '<thead><tr><th class="daytitle" colspan="4">' + dayTitle(day) + '</th></tr>';
    t += '<tr><th>સમય</th><th>જૂથ</th><th>વિષય</th><th>સ્થળ</th></tr></thead>';
    t += '<tbody>' + rows + '</tbody></table>';
    html += wrapDayTable(t);
  });
  return html;
}
function buildLegend(usedSubjects){
  var keys = Object.keys(usedSubjects).sort(function(a, b){ return a.localeCompare(b, 'gu'); });
  if (!keys.length) return '';
  var h = '<div class="legend pdf-block">';
  keys.forEach(function(s){
    h += '<div class="lg-item"><span class="lg-swatch" style="background-color:' + colorForSubject(s) + '"></span>' + esc(s) + '</div>';
  });
  h += '</div>';
  return h;
}

/* ---------- selection labels & filenames ---------- */
function selectionLabel(){
  var parts = [];
  if (state.view === 'group'){
    var g = groupByKey(state.group);
    if (g) parts.push('જૂથ: ' + g.name + ' (' + g.age + ')');
  } else if (state.view === 'teacher'){
    parts.push('શિક્ષક: ' + state.teacher);
  }
  if (state.day !== 'all'){
    var d = dayDate(state.day);
    parts.push('દિવસ: ' + state.day + (d ? ' (' + d + ')' : ''));
  }
  return parts.join('  •  ');
}
function fileBaseName(){
  var parts = ['samay-patrak'];
  if (state.view === 'group'){
    var g = groupByKey(state.group);
    parts.push(g ? g.name : state.group);
  } else if (state.view === 'teacher'){
    parts.push(state.teacher);
  }
  if (state.day !== 'all') parts.push(state.day);
  return parts.join('-').replace(/[\\/:*?"<>|\s]+/g, '-');
}

/* ---------- render ---------- */
function render(){
  document.getElementById('groupCtrl').style.display = state.view === 'group' ? '' : 'none';
  document.getElementById('teacherCtrl').style.display = state.view === 'teacher' ? '' : 'none';
  document.getElementById('selInfo').textContent = selectionLabel();

  var usedSubjects = {};
  var html = '';
  if (state.view === 'group') html = buildGroupView(usedSubjects);
  else if (state.view === 'teacher') html = buildTeacherView(usedSubjects);
  else html = buildFullView(usedSubjects);

  if (!html) html = '<p style="text-align:center;color:var(--mu)">કોઈ માહિતી નથી</p>';
  html += buildLegend(usedSubjects);
  document.getElementById('printArea').innerHTML = html;
}

/* ---------- downloads ---------- */
function setBusy(busy){
  document.getElementById('imgBtn').disabled = busy;
  document.getElementById('pdfBtn').disabled = busy;
}
async function downloadImage(){
  setBusy(true);
  try {
    await document.fonts.ready;
    var el = document.getElementById('capture');
    var canvas = await html2canvas(el, { scale: 2, backgroundColor: '#FBF7F2', useCORS: true });
    var a = document.createElement('a');
    a.download = fileBaseName() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (e) {
    alert('ઇમેજ બનાવવામાં ભૂલ: ' + e.message);
  } finally {
    setBusy(false);
  }
}
async function downloadPDF(){
  setBusy(true);
  try {
    await document.fonts.ready;
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF('p', 'mm', 'a4');
    var pageW = 210, pageH = 297, margin = 10, gap = 4;
    var y = margin;
    // Render each day-table (and the header/legend) as its own image so
    // page breaks always fall between tables, never through a row.
    var blocks = document.querySelectorAll('#capture .pdf-block');
    for (var i = 0; i < blocks.length; i++){
      var canvas = await html2canvas(blocks[i], { scale: 2, backgroundColor: '#ffffff', useCORS: true });
      var w = pageW - 2 * margin;
      var h = canvas.height * w / canvas.width;
      if (h > pageH - 2 * margin){ // a single table taller than a page: shrink to fit
        h = pageH - 2 * margin;
        w = canvas.width * h / canvas.height;
      }
      if (y + h > pageH - margin && y > margin){
        pdf.addPage();
        y = margin;
      }
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, y, w, h);
      y += h + gap;
    }
    pdf.save(fileBaseName() + '.pdf');
  } catch (e) {
    alert('PDF બનાવવામાં ભૂલ: ' + e.message);
  } finally {
    setBusy(false);
  }
}

/* ---------- init ---------- */
(function init(){
  var groupSel = document.getElementById('groupSel');
  DATA.groups.forEach(function(g){
    var o = document.createElement('option');
    o.value = g.key; o.textContent = g.name + ' (' + g.age + ')';
    groupSel.appendChild(o);
  });
  state.group = DATA.groups.length ? DATA.groups[0].key : '';

  var teacherSel = document.getElementById('teacherSel');
  var teachers = teachersInWeek();
  teachers.forEach(function(t){
    var o = document.createElement('option');
    o.value = t; o.textContent = t;
    teacherSel.appendChild(o);
  });
  state.teacher = teachers.length ? teachers[0] : '';

  var daySel = document.getElementById('daySel');
  var all = document.createElement('option');
  all.value = 'all'; all.textContent = 'બધા દિવસ';
  daySel.appendChild(all);
  DATA.days.forEach(function(d){
    var o = document.createElement('option');
    var dt = dayDate(d);
    o.value = d; o.textContent = d + (dt ? ' (' + dt.slice(0, 5) + ')' : '');
    daySel.appendChild(o);
  });

  document.getElementById('viewSel').onchange = function(){ state.view = this.value; render(); };
  groupSel.onchange = function(){ state.group = this.value; render(); };
  teacherSel.onchange = function(){ state.teacher = this.value; render(); };
  daySel.onchange = function(){ state.day = this.value; render(); };

  render();
})();
</script>
